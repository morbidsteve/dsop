# OpenSSF Scorecard — automated supply-chain / repo-hygiene assessment of THIS repository
# (Branch-Protection, Code-Review, Dangerous-Workflow, Token-Permissions, Pinned-Dependencies,
#  Signed-Releases, Vulnerabilities, Maintained, SAST, etc.)
#
# Evidence for: SR-3 (supply-chain controls/processes), SA-15 (development process/tools),
# SSDF PO.3 (supporting toolchains) / PO.5 (secure dev environment). Results feed code scanning
# and are pulled into the Body of Evidence.

name: openssf-scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "23 4 * * 2"
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
      - name: Also emit JSON for the Body of Evidence
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard-results.json
          results_format: json
          publish_results: false
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-scorecard
          path: |
            scorecard-results.sarif
            scorecard-results.json
          retention-days: 90
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
