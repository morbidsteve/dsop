name: "DSOP CodeQL config"

# Tune for your real workload. `security-extended` + `security-and-quality` query suites are
# requested in the workflow; add custom query packs here if your program maintains them.
queries:
  - uses: security-extended
  - uses: security-and-quality

# NOTE: do not add a top-level `paths:` allowlist here unless you also include `.github` — the
# `actions` language analyzes `.github/workflows/` (and composite actions), so restricting to just
# the app source makes the GitHub-Actions analysis fail with "no code seen". We only *exclude* a
# few non-source paths and let CodeQL scope each language to where its code actually lives.
paths-ignore:
  - "**/tests/**"          # test fixtures (still review them; just not part of CodeQL's scope)
  - "site/assets/**"       # vendored / generated front-end assets
  - "**/*.md"

# packs:
#   - my-org/my-codeql-queries@^1.0.0
