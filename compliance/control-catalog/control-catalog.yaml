      actions/attest-build-provenance) describing the builder, source commit, and inputs, pushed to
      the registry alongside the image and recorded in the Sigstore transparency log; Git history +
      signed tags provide source provenance. (SSDF PS.3.2.)
    evidence:
      - { gate: container }
      - { gate: sbom }
      - { artifact: "provenance/**" }
      - { artifact: "sbom/**" }
    assessment:
      methods: [Examine, Test]
      objective: "Provenance of systems, system components, and associated data is documented, monitored, and maintained; changes to provenance are tracked."
    raise_gate: [7]
    ssdf: [PS.3]

  - id: SR-11
    family: SR
    title: Component Authenticity
    baseline: [low, moderate, high]
    implementation_status: implemented
    responsibility: system
    ccis: [CCI-Pending]
    narrative: >
      Component authenticity is established and verified: container images are cryptographically
      signed and signatures are verified before deployment (admission control); base/dependency
      artifacts come from authenticated, approved sources with integrity verification; the SBOM is
      the authoritative component inventory backing authenticity checks; unsigned or unverifiable
      artifacts are rejected (RAISE: only signed release containers may be deployed; admission
      control enforced by the RPOC). Anti-counterfeit awareness is part of role-based training (with
      AC-6/CM-5 limiting who can introduce components).
    evidence:
      - { gate: container }
      - { gate: sbom }
      - { artifact: "container/**" }
    assessment:
      methods: [Examine, Test]
      objective: "Anti-counterfeit policy/procedures are in place; component authenticity is verified; counterfeit/suspect components are reported and handled."
    raise_gate: [7, 8]
    ssdf: [PS.2, PW.4]
